<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Watch Full Video</title>

<style>
body{
margin:0;
background:#000;
font-family:sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:#fff;
}

.container{
text-align:center;
max-width:420px;
width:100%;
padding:20px;
}

.thumb{
width:100%;
border-radius:12px;
margin-bottom:20px;
}

h2{
margin-bottom:20px;
}

.btn{
display:block;
width:100%;
padding:14px;
margin:10px 0;
font-size:16px;
border:none;
border-radius:10px;
cursor:pointer;
}

.play{
background:#16a34a;
color:#fff;
}

.tele{
background:#2563eb;
color:#fff;
}

.loading{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000;
display:flex;
justify-content:center;
align-items:center;
font-size:20px;
z-index:999;
display:none;
}
</style>
</head>

<body>

<div class="container">

<!-- thumbnail (ganti kalau mau) -->
<img src="thumb.jpg" class="thumb">

<h2>Watch Full Video</h2>

<button class="btn play" onclick="goVideo()">▶ Lanjut Video</button>
<button class="btn tele" onclick="goTele()">📲 Join Telegram</button>

</div>

<div class="loading" id="loading">
Loading video...
</div>

<script>

// ================= CONFIG =================
const FINAL_BASE = "https://vidtrx.com";
const TELEGRAM = "https://t.me/viddayvid";

const AFFILIATE = [
'https://s.shopee.co.id/4qA9Bh0rNF',
      'https://s.shopee.co.id/8V3RYSQETG', 
      'https://s.shopee.co.id/9KcXC4pyuT',
      'https://s.shopee.co.id/9pYnn0fM8L', 
      'https://s.shopee.co.id/9pYnn0fM8L',
      'https://s.shopee.co.id/8pgBcJjIzl',
      'https://s.shopee.co.id/60M0F7txlS',
      'https://s.shopee.co.id/6AfWmBq6UQ',
      'https://s.shopee.co.id/7AY3y2lgdw',
      'https://s.shopee.co.id/8zzi9Qj2xa',
      'https://s.shopee.co.id/6pvDZSqkme',
      'https://s.shopee.co.id/4VXInCPYuK',
      'https://s.shopee.co.id/5q2gNfRMx8'
    ];

// ==========================================

// ambil ID dari URL
function getId(){
  let parts = window.location.pathname.split("/");
  return parts.pop() || parts.pop() || "default";
}

// random affiliate
function rand(){
  return AFFILIATE[Math.floor(Math.random()*AFFILIATE.length)];
}

// delay random (2–5 detik)
function randomDelay(){
  return Math.floor(Math.random()*3000)+2000;
}

// klik lanjut video
function goVideo(){

  let id = getId();

  // buka shopee (tab baru)
  window.open(rand(), "_blank");

  // tampil loading
  document.getElementById("loading").style.display = "flex";

  // delay natural
  let delay = randomDelay();

  // redirect ke tujuan
  setTimeout(()=>{
    window.location.href = FINAL_BASE.replace(/\/$/,"") + "/e/" + id;
  }, delay);

}

// klik telegram
function goTele(){
  window.location.href = TELEGRAM;
}

</script>

</body>
</html>
